name: biux
description: Biux - App de ciclismo social con tracking, grupos y mapas.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── Firebase ───────────────────────────────────────────
  firebase_core: ^4.1.1
  firebase_auth: ^6.0.2
  firebase_analytics: ^12.0.1
  firebase_crashlytics: ^5.0.2
  firebase_database: ^12.0.2
  firebase_messaging: ^16.1.1
  firebase_storage: ^13.0.1
  cloud_firestore: ^6.0.2

  # ─── Navegación y Estado ────────────────────────────────
  go_router: ^17.0.1
  provider: ^6.1.5+1
  flutter_riverpod: ^2.4.9

  # ─── Mapas y Ubicación ─────────────────────────────────
  google_maps_flutter: ^2.13.1
  geolocator: ^14.0.2
  location: ^8.0.1
  flutter_polyline_points: ^3.1.0
  fluster: ^1.2.0

  # ─── Networking ─────────────────────────────────────────
  http: ^1.5.0
  dio: ^5.9.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0

  # ─── Autenticación Social ──────────────────────────────
  sign_in_with_apple: ^7.0.1

  # ─── UI - Navegación y Barras ──────────────────────────
  curved_navigation_bar: ^1.0.6
  stylish_bottom_bar: ^1.1.1
  spincircle_bottom_bar: ^2.0.0
  buttons_tabbar: ^1.3.15

  # ─── UI - Imágenes y Media ─────────────────────────────
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.2.0
  image: ^4.3.0
  photo_view: ^0.15.0
  photo_manager: ^3.7.1
  photo_manager_image_provider: ^2.2.0
  easy_image_viewer: ^1.5.1
  flutter_image_compress: ^2.3.0
  pinch_zoom: ^2.0.1

  # ─── UI - Carousels y Slideshows ───────────────────────
  carousel_slider: ^5.1.1
  carousel_pro_nullsafety: ^2.0.0
  flutter_image_slideshow: ^0.1.6
  page_view_sliding_indicator: ^0.0.4

  # ─── UI - Ratings y Estrellas ──────────────────────────
  flutter_rating_stars: ^1.1.0
  simple_star_rating: ^0.0.3
  smooth_star_rating_nsafe: ^1.0.0+1

  # ─── UI - Diálogos y Loading ───────────────────────────
  proste_dialog: ^2.1.2
  loading_overlay: ^0.5.0
  loading_indicator: ^3.1.1
  easy_splash_screen: ^1.0.4

  # ─── UI - Texto y Contenido ────────────────────────────
  readmore: ^3.0.0
  expandable: ^5.0.1
  autocomplete_textfield_ns: ^2.0.0
  percent_indicator: ^4.2.5

  # ─── UI - Iconos ───────────────────────────────────────
  font_awesome_flutter: ^10.10.0
  fluttericon: ^2.0.0
  cupertino_icons: ^1.0.8

  # ─── QR y Scanner ──────────────────────────────────────
  mobile_scanner: ^7.1.4
  qr_flutter: ^4.1.0

  # ─── Video ─────────────────────────────────────────────
  video_player: ^2.8.1

  # ─── PDF e Impresión ───────────────────────────────────
  pdf: ^3.11.3
  printing: ^5.14.2

  # ─── WebView ───────────────────────────────────────────
  webview_flutter: ^4.13.0

  # ─── Utilidades ────────────────────────────────────────
  intl: ^0.20.2
  timeago: ^3.7.0
  rxdart: ^0.28.0
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.0
  permission_handler: ^12.0.1
  diacritic: ^0.1.6
  vector_math: ^2.2.0
  flutter_local_notifications: ^20.1.0
  flutter_plugin_android_lifecycle: ^2.0.30

  # ─── Serialización ─────────────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ─── Animaciones ───────────────────────────────────────
  flare_flutter: ^3.0.2

  # ─── Pull to Refresh ──────────────────────────────────
  pull_to_refresh: ^2.0.0
  local_auth: ^3.0.1
  record: ^6.2.0
  audio_waveforms: ^2.0.2
  just_audio: ^0.9.40
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1
  build_runner: ^2.4.7
  freezed: ^3.2.3
  json_serializable: ^6.7.1
  mockito: ^5.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "img/biux_logo_background_blue.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#16242D"
  adaptive_icon_foreground: "img/biux_logo_letters_white.png"
  android_12:
    adaptive_icon_background: "#16242D"
    adaptive_icon_foreground: "img/biux_logo_letters_white.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: img/biux_logo_background_blue.png
  ios: true
  android: true
  android_12:
    image: img/biux_logo_background_blue.png
    color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - img/
    - img/shop/
    - img/shop/products/
